<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

        .contenedor-principal {
            display: flex;
            flex-direction: column;
            align-items: center;
            /*gap: 0; Esto mantiene la imagen y el botón juntos */
        }

        .imagen-tarjeta {
            width: 500px;
            display: block;
        }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            
            /* AJUSTA ESTO PARA SUBIR EL BOTÓN */
            /* He puesto -140px para que suba bastante y encaje en el hueco */
            margin-top: -90px; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="fondo_bono2.png" class="imagen-tarjeta">
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
