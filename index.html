<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* Contenedor que mantiene todo como un bloque único */
        .contenedor-principal {
            width: 450px; 
            display: grid;
            justify-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
            grid-row: 1;
            grid-column: 1;
        }

        .btn-nospi {
            grid-row: 1;
            grid-column: 1;
            z-index: 10;
            
            /* Ajuste preciso para la franja blanca */
            /* Si al probarlo lo quieres un poquito más abajo, aumenta este número */
            /* Si lo quieres un poquito más arriba, disminuye este número */
            margin-top: 385px; 
            
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
