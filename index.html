<!DOCTYPE html>
<html lang="es">
<head>
    <style>
    /* El contenedor es el "padre" que define el tamaño */
    .contenedor-tarjeta {
        position: relative;
        width: 450px; /* Ajusta este ancho a tu gusto */
        margin: auto;
    }

    /* La imagen se estira para llenar el contenedor */
    .imagen-tarjeta {
        width: 100%;
        display: block;
    }

    /* El botón se posiciona respecto al padre */
    .btn-nospi {
        position: absolute;
        bottom: 60px; /* Ajusta este valor (ej: 40px, 50px, 60px) para subir/bajar */
        left: 50%;
        transform: translateX(-50%);
        
        /* Estilo del botón */
        background: linear-gradient(135deg, #005a8d, #32d74b);
        color: white;
        padding: 15px 40px;
        border-radius: 50px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2" class="imagen-tarjeta">
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
