<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descubre Nospi</title>
   <style>
        /* Contenedor que agrupa la imagen y el botón */
        .contenedor-tarjeta {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 450px; /* Ajusta el ancho de tu tarjeta aquí */
            margin: 0 auto;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            
            /* AJUSTE FINAL: Este es el único número que debes tocar */
            /* Si está muy arriba, aumenta el número (ej: -90px) */
            /* Si está muy abajo, disminuye el número (ej: -70px) */
            margin-top: -80px; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="fondo_bono2.png" class="mi-imagen">
        
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
