<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

       .contenedor-tarjeta {
    position: relative;
    width: 100%;       /* O ajusta a un valor fijo como 450px */
    max-width: 500px;
    margin: 0 auto;    /* Esto centra toda la tarjeta en la página */
}

.imagen-tarjeta {
    width: 100%;       /* La imagen llena el contenedor */
    display: block;    /* Elimina espacios en blanco no deseados debajo */
}

.btn-nospi {
    position: absolute;
    bottom: 12%;       /* Ubicación vertical precisa */
    left: 50%;         /* Centrado horizontal */
    transform: translateX(-50%);
    
    /* Tus estilos de botón */
    background: linear-gradient(135deg, #005a8d, #32d74b);
    color: white;
    padding: 15px 40px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    white-space: nowrap;
}
    </style>
</head>
<body>

<div class="contenedor-tarjeta">
    <img src="fondo_boton2.png" class="imagen-tarjeta">
    <button class="btn-nospi">Descubre Nospi</button>
</div>

</body>
</html>
