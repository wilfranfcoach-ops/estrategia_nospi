<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .tarjeta-container {
            width: 400px;
            /* Aquí ponemos la imagen que recortaste sin el botón */
            background-image: url('fondo_bono.png');
            background-size: contain;
            background-repeat: no-repeat;
            padding: 20px;
            text-align: center;
        }

        /* Espacio para que el botón no quede pegado a la imagen */
        .espacio-boton { height: 280px; }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-nospi:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <div class="espacio-boton"></div> <button class="btn-nospi" onclick="window.location.href='https://tusitio.com'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
