<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bono Nospi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .code { font-size: 2rem; font-weight: bold; color: #d4a017; margin: 20px 0; border: 2px dashed #d4a017; padding: 10px; }
        button { background: #333; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>¡Lo lograste!</h2>
        <p>Tu bono de <b>$10,000</b> está listo para redimir.</p>
        <div class="code">NOSPI-2026</div>
        <p>Muéstrale esto al panadero y pregunta: <i>¿Aquí reciben Nospi?</i></p>
        <button onclick="window.location.href='https://tusitio.com'">Descubre Nospi</button>
    </div>
</body>
</html>
