<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor que actúa como ancla */
        .tarjeta-container {
            position: relative; /* ¡CLAVE! Todo lo de adentro se posiciona respecto a esto */
            width: 450px;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            position: absolute; /* Se despega del flujo normal para flotar sobre la imagen */
            left: 50%;
            transform: translateX(-50%);
            
            /* AJUSTE FINO:
               Este valor controla la posición desde el borde superior de la tarjeta.
               Como se bajó mucho antes, vamos a reducir este valor para que suba. */
            top: 380px; 
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
