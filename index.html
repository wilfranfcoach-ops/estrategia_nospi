<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nospi</title>
    <style>
        /* Centrado total en la pantalla */
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

        /* Contenedor que mantiene la relación de aspecto */
        .contenedor-tarjeta {
            position: relative;
            width: 450px; /* Ajusta el ancho aquí */
        }

        /* Imagen que llena el contenedor */
        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        /* Botón posicionado de forma absoluta para no desconfigurarse */
        .btn-nospi {
            position: absolute;
                /* Disminuye este valor para que el botón baje hacia el borde inferior */
                bottom: 8%; 
                left: 50%;
                transform: translateX(-50%);
        
        /* ... el resto de tus estilos igual ... */
            
            /* Diseño del botón */
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        
        <button class="btn-nospi" onclick="window.location.href='https://nospi.com'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
