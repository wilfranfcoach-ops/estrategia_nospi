<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bono Nospi</title>
    <style>
        /* Estilos generales para centrar todo */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f8f9fa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        /* La tarjeta principal */
        .card { 
            background: white; 
            width: 90%; 
            max-width: 450px; 
            padding: 40px 25px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; 
            border: 1px solid #eee;
        }

        /* Estilo para el logo */
        .logo { 
            width: 140px; 
            margin-bottom: 20px; 
        }

        /* Títulos y texto */
        h2 { color: #002d62; font-size: 2.2rem; margin: 0 0 15px 0; }
        p { color: #4a4a4a; font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; }

        /* El recuadro del código */
        .code { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #d4a017; 
            margin: 20px 0; 
            border: 3px dashed #d4a017; 
            padding: 20px; 
            border-radius: 20px; 
            background-color: #fffdf5;
            letter-spacing: 2px;
        }

        /* Botón estilo Nospi */
        button { 
            background: linear-gradient(135deg, #005a8d 0%, #32d74b 100%); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.2rem; 
            font-weight: bold; 
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover { 
            transform: scale(1.02); 
            box-shadow: 0 5px 15px rgba(50, 215, 75, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/wilfrancoch-ops/estrategia_nospi/main/Logo8_Nospi.jpg" class="logo" alt="Logo Nospi">
        
        <h2>¡Lo lograste!</h2>
        <p>Tu bono de <b>$10,000</b> está listo para redimir.</p>
        
        <div class="code">NOSPI-2026</div>
        
        <p>Muéstralo en tu panadería más cercana y pregunta:<br> <i>¿Aquí reciben Nospi?</i></p>
        
        <button onclick="window.location.href='#'">Descubre Nospi</button>
    </div>

</body>
</html>
