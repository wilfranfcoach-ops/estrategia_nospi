<!DOCTYPE html>
<html lang="es">
<head>
<style>
    /* Aseguramos que el cuerpo no tenga espacios extra */
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        background-color: #ffffff;
    }

    /* 1. Este contenedor es el ancla. Todo lo de adentro se mueve con él. */
    .contenedor-tarjeta {
        position: relative;
        width: 450px; /* Ajusta según el ancho de tu imagen */
    }

    .imagen-tarjeta {
        width: 100%;
        display: block;
    }

    /* 2. El botón ahora está atrapado dentro del contenedor */
    .btn-nospi {
        position: absolute;
        bottom: 40px; /* Ajusta este valor para subir o bajarlo de la franja */
        left: 50%;
        transform: translateX(-50%);
        
        /* Estilos del botón */
        padding: 10px 40px;
        background: linear-gradient(135deg, #005a8d, #32d74b);
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        z-index: 10;
        white-space: nowrap;
    }
</style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
