<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #ffffff; /* Fondo blanco */
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* 1. Este contenedor es el "ancla" */
        .tarjeta-container {
            position: relative;
            width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        /* 2. El botón ahora tiene una posición controlada */
        .btn-nospi {
            /* Usamos un margen negativo para "subir" el botón sobre la imagen */
            /* Ajusta este valor: si sube mucho, hazlo menos negativo; si baja mucho, más negativo */
            margin-top: -70px; 
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
