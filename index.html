<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

        .contenedor-tarjeta {
            position: relative; /* El botón se ajustará a los bordes de este contenedor */
            width: 500px; /* Ajusta este ancho y todo crecerá proporcionalmente */
        }

        .imagen-tarjeta {
            width: 100%; /* La imagen siempre ocupará el 100% del contenedor */
            display: block;
        }

        .btn-nospi {
            position: absolute; /* Sacamos el botón del flujo normal */
            bottom: 40px;       /* El botón siempre estará a 40px del borde inferior */
            left: 50%;
            transform: translateX(-50%); /* Centrado horizontal perfecto */
            
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2" class="imagen-tarjeta">
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
