<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. Este contenedor es tu salvación: es el "padre" de ambos */
        .tarjeta-contenedor {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 450px; /* Ajusta este ancho si es necesario */
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        /* 2. El botón ahora vive DENTRO del contenedor */
        .btn-nospi {
            /* Usamos margen negativo para "subir" el botón sobre la imagen */
            /* Si necesitas bajarlo 1cm, simplemente reduce este valor (ej. de -80px a -70px) */
            margin-top: -80px; 
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="tarjeta-contenedor">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
