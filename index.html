<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descubre Nospi</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        .contenedor-principal {
            position: relative;
            width: 450px; /* Ancho fijo para que no se mueva */
        }

        .mi-imagen {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            position: absolute;
            /* Estos valores mueven el botón con precisión de píxel */
            top: 79%; 
            left: 50%;
            transform: translateX(-50%);
            
            /* Estilo del botón */
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="fondo_bono2.png" class="mi-imagen">
        
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
