<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

        /* Contenedor padre */
        .contenedor-tarjeta {
            position: relative; /* Clave para posicionar el botón dentro */
            width: 450px;       /* Ajusta el ancho de tu tarjeta aquí */
        }

        .imagen-tarjeta {
            width: 100%;        /* La imagen se ajusta al contenedor */
            display: block;
        }

        .btn-nospi {
            position: absolute; /* Saca al botón del flujo normal */
            left: 50%;          /* Centrado horizontal */
            transform: translateX(-50%); /* Ajuste fino de centrado */
            
            /* --- AJUSTA ESTE VALOR PARA BAJAR EL BOTÓN --- */
            /* Aumenta el porcentaje (ej: 75%) para bajarlo más */
            /* Disminuye el porcentaje (ej: 70%) para subirlo */
            top: 78%;
            
            /* Estilo del botón */
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta">
        
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
