<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bono Nospi</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* El contenedor envuelve a ambos elementos */
        .contenedor-principal {
            position: relative;
            width: 450px; /* Ancho fijo de tu tarjeta */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            /* Posicionamos respecto a la tarjeta */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* AJUSTE FINAL: 
               Este valor controla la distancia desde el borde inferior de la tarjeta.
               Aumenta este número para subir, disminúyelo para bajar. */
            bottom: 45px; 
            
            /* Estilo del botón */
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
