<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #ffffff; /* Fondo blanco garantizado */
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .tarjeta-container {
            position: relative; /* Ancla necesaria para el botón */
            width: 450px; 
            margin-top: 20px;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* AJUSTE FINO: 
               Si al probarlo necesitas que baje más, aumenta este número (ej. 685px).
               Si necesitas que suba, disminuye este número (ej. 675px). */
            top: 680px; 
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
