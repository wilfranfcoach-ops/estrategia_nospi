<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bono Nospi</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* Este contenedor actúa como el "ancla" para el botón */
        .contenedor-tarjeta {
            position: relative; 
            width: 450px; /* Ajusta este ancho según necesites */
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            position: absolute; /* Esto permite moverlo libremente sobre la imagen */
            left: 50%;
            transform: translateX(-50%); /* Centrado horizontal perfecto */
            
            /* --- AJUSTE AQUÍ --- */
            /* Cambia este valor para subir o bajar el botón */
            /* Menos píxeles = más arriba, Más píxeles = más abajo */
            bottom: 30px; 
            
            /* Estilo del botón */
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
