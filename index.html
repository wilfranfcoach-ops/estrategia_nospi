<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        .contenedor-contenedor {
            width: 450px;
            display: grid; /* El Grid mantiene todo unido como un solo bloque */
            justify-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
            grid-row: 1;
            grid-column: 1;
        }

        .btn-nospi {
            grid-row: 1;
            grid-column: 1;
            
            /* Esto mueve el botón hacia abajo dentro del mismo espacio de la imagen */
            /* Si está muy arriba, aumenta este número. Si está muy abajo, redúcelo. */
            margin-top: 380px; 
            
            z-index: 10;
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-contenedor">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
