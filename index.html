<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descubre Nospi</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
        }

        /* Este contenedor es el "marco" de tu diseño */
        .contenedor-tarjeta {
            position: relative; /* Clave: esto permite que el botón se mueva libremente aquí */
            width: 450px;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
          position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* CAMBIA ESTO: De 95% a píxeles fijos */
            /* Empieza probando con 300px o 350px e ir ajustando */
            top: 170px; 
            
            margin: 0;
            white-space: nowrap;
            z-index: 10;
            
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 8px 40px; 
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
