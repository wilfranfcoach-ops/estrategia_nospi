<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* El contenedor es el "carril" que mantiene todo unido */
        .tarjeta-container {
            width: 450px;
            display: grid;
            grid-template-rows: auto auto; /* Fila 1: Imagen, Fila 2: Botón */
            justify-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
            grid-row: 1;
        }

        .btn-nospi {
            grid-row: 1; /* El botón ocupa la misma fila que la imagen */
            z-index: 10;
            
            /* Ajuste de posición: 
               Como ya no es absoluto, solo usamos margen para moverlo hacia abajo 
               dentro de su propio contenedor. */
            margin-top: 390px; 
            
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
