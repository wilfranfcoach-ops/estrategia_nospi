<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* El contenedor principal centra todo */
        .contenedor-principal {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Este es el bloque que mantiene a la imagen y al botón juntos */
        .tarjeta-unidad {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px; /* Ajusta según el tamaño de tu imagen */
        }

        .imagen-tarjeta {
            width: 100%;
            height: auto;
            display: block;
        }

        /* El botón ahora depende del contenedor, no de la pantalla */
        .boton-nospi {
            margin-top: -50px; /* Este número negativo es el que lo "sube" a la franja */
            padding: 12px 30px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="tarjeta-unidad">
            <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
            <button class="boton-nospi">Descubre Nospi</button>
        </div>
    </div>

</body>
</html>
