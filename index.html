<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

        .tarjeta {
            width: 650px; 
            height: 620px;
            /* Usamos la imagen LIMPIA (sin el botón viejo) */
            background-image: url('fondo_bono2.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinea el botón al final */
            padding-bottom: 35px; /* Ajusta la distancia desde el borde inferior */
        }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <button class="btn-nospi" onclick="window.location.href='#'">Descubre Nospi</button>
    </div>

</body>
</html>
