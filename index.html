<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* El contenedor es el "ancla" que mantiene todo unido */
        .contenedor-tarjeta {
            width: 450px; 
            display: grid; /* Grid nos permite apilar elementos exactamente */
            justify-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
            grid-row: 1; /* Ambos ocupan la fila 1 */
            grid-column: 1;
        }

        .btn-nospi {
            grid-row: 1; /* Ambos ocupan la fila 1 */
            grid-column: 1;
            z-index: 10;
            
            /* USAMOS MARGEN PARA POSICIONAR */
            /* Este valor empuja el botón hacia abajo desde el borde superior de la tarjeta */
            margin-top: 390px; 
            
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
