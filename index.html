<!DOCTYPE html>
<html lang="es">
<head>
    <style>
    /* Contenedor principal: la base de todo */
    .contenedor-tarjeta {
        position: relative; /* Esto es lo que permite que el botón sepa dónde ubicarse */
        width: 450px;      /* Tamaño fijo para que no se desconfigure */
        margin: auto;
    }

    /* Tu imagen limpia (asegúrate de que el nombre sea el correcto) */
    .imagen-limpia {
        width: 100%;
        display: block;
    }

    /* El botón se posiciona exactamente donde tú quieras */
    .btn-nospi {
        position: absolute;
        /* Cambia este porcentaje para subir o bajar el botón de forma precisa */
        bottom: 15%; 
        left: 50%;
        transform: translateX(-50%);
        
        /* Estilos del botón */
        background: linear-gradient(135deg, #005a8d, #32d74b);
        color: white;
        padding: 15px 40px;
        border-radius: 50px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
</style>

<div class="contenedor-tarjeta">
    <img src="tu_imagen_limpia.jpg" class="imagen-limpia">
    <button class="btn-nospi">Descubre Nospi</button>
</div>

</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta">
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi 
        </button>
    </div>

</body>
</html>
