<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body {
            margin: 0;
            background-color: #ffffff; /* Fondo blanco garantizado */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. Usamos CSS Grid para unir la imagen y el botón en un solo bloque */
        .tarjeta-container {
            display: grid;
            width: 450px; /* Ancho fijo de tu tarjeta */
            justify-items: center;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
            grid-row: 1;
            grid-column: 1;
        }

        .btn-nospi {
            grid-row: 1;
            grid-column: 1;
            z-index: 10;
            
            /* 2. Ajuste fino usando margen superior (margin-top) */
            /* Este valor mueve el botón hacia abajo desde el borde superior de la tarjeta */
            /* Aumenta el número para bajarlo, disminúyelo para subirlo */
            margin-top: 385px; 
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
