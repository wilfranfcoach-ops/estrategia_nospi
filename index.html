<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        /* Creamos un contenedor que apila elementos verticalmente */
        .contenedor-tarjeta {
            display: grid;
            grid-template-rows: auto auto; /* Dos filas: Imagen y Botón */
            justify-items: center;
            width: 450px;
            gap: 0; /* Sin espacio entre ellos */
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 8px 40px; 
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            
            /* Ajuste preciso sin caos: usamos margin-top negativo 
               para subir el botón sobre la imagen de forma controlada */
            margin-top: -65px; 
            margin-bottom: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
