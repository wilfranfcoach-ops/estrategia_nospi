<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descubre Nospi</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        .contenedor-tarjeta {
            position: relative;
            width: 450px;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* AJUSTE: He cambiado a -360px para bajar el botón */
            /* Si quieres bajarlo MÁS, usa un número más pequeño (ej. -350px) */
            /* Si quieres subirlo, usa un número más grande (ej. -370px) */
            margin-top: -360px; 
            
            padding: 5px 40px; 
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
