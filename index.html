<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

       .tarjeta {
                width: 500px;
                height: 600px; /* Ajusta según el tamaño de tu imagen */
                background-image: url('fondo_bono2.png');
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center top;
                position: relative; /* ¡Esto es clave! Le dice al botón que el límite es esta tarjeta */
            }

.btn-nospi {
                position: absolute; /* Esto saca al botón del flujo normal */
                bottom: 60px;      /* <--- CONTROLA ESTO: Distancia desde el borde inferior */
                left: 50%;         /* Centrado horizontal */
                transform: translateX(-50%); /* Ajuste fino para centrar exactamente */
                
                background: linear-gradient(135deg, #005a8d, #32d74b);
                color: white;
                border: none;
                padding: 18px 60px;
                border-radius: 50px;
                font-size: 1.2rem;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    ]
        </style>
</head>
<body>

    <div class="tarjeta">
        <button class="btn-nospi" onclick="window.location.href='#'">Descubre Nospi</button>
    </div>

</body>
</html>
