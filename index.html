<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f8f9fa; 
        }

        .contenedor-tarjeta {
            position: relative; /* Esto es obligatorio para centrar el botón */
            width: 500px;       /* Ajusta este ancho al tamaño de tu imagen */
        }

        .imagen-tarjeta {
            width: 100%;        /* La imagen ocupa todo el contenedor */
            display: block;
        }

        .btn-nospi {
            position: absolute; /* Permite mover el botón libremente sobre la imagen */
            
            /* CENTRADO HORIZONTAL PERFECTO */
            left: 50%;
            transform: translateX(-50%);
            
            /* POSICIÓN VERTICAL: Ajusta este porcentaje */
            /* Si quieres bajarlo, aumenta este número (ej: 75%) */
            /* Si quieres subirlo, disminuye este número (ej: 65%) */
            top: 72%; 
            
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            padding: 18px 50px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="contenedor-tarjeta">
    <img src="fondo_boton2.png" class="imagen-tarjeta">
    <button class="btn-nospi">Descubre Nospi</button>
</div>

</body>
</html>
