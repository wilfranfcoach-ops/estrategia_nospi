<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descubre Nospi</title>
    <style>
        /* 1. Fondo blanco puro en toda la pantalla */
        body {
            margin: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. El contenedor es el "ancla" donde vive el botón */
        .tarjeta-container {
            position: relative;
            width: 450px;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        /* 3. Botón posicionado específicamente sobre el espacio blanco */
        .btn-nospi {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* Ajuste vertical: controla la altura exacta en la franja blanca */
            /* Si quieres bajarlo, aumenta este valor. Si quieres subirlo, disminúyelo. */
            top: 760px; 
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
