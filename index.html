<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubre Nospi</title>
   <style>
        .contenedor-tarjeta {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 450px;
            margin: 0 auto;
            position: relative;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            
            /* FUERZA EL MOVIMIENTO */
            /* Cambia -80px por -60px para bajarlo, o -100px para subirlo */
            margin-top: -60px !important; 
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">

        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
