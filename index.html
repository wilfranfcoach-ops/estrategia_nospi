<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        .contenedor-tarjeta {
            position: relative;
            width: 450px; /* Tamaño fijo, no se mueve */
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* AQUÍ ESTÁ EL AJUSTE EXACTO EN PÍXELES */
            /* Cambia este valor hasta que el botón tape perfectamente el hueco blanco */
            top: 670px; 
            
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 10px 40px; 
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
