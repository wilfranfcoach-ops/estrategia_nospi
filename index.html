<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bono Nospi</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        /* 1. Este es tu "ancla" */
        .contenedor-tarjeta {
            position: relative; /* ¡Esto es la clave! */
            width: 450px;       /* Ajusta el ancho de tu tarjeta */
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        /* 2. El botón ahora vive dentro del contenedor */
        .btn-nospi {
            position: absolute; 
            bottom: 35px;       /* Distancia fija desde abajo */
            left: 50%;          /* Centrado horizontal */
            transform: translateX(-50%);
            
            /* Estilo del botón */
            padding: 8px 40px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="contenedor-tarjeta">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
