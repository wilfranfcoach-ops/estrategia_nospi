<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinea al tope para evitar saltos */
            min-height: 100vh;
        }

        .tarjeta-container {
            position: relative; /* ¡Esto es lo que mantiene todo junto! */
            width: 450px; 
            margin-top: 20px;
        }

        .imagen-tarjeta {
            width: 100%;
            display: block;
        }

        .btn-nospi {
            /* Posición absoluta respecto a su padre (.tarjeta-container) */
            position: absolute;
            
            /* Ajustamos la posición vertical en porcentaje para que sea elástica pero estable */
            top: 83%; 
            left: 50%;
            transform: translate(-50%, -50%);
            
            padding: 10px 45px;
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <img src="fondo_bono2.png" class="imagen-tarjeta" alt="Bono Nospi">
        <button class="btn-nospi">Descubre Nospi</button>
    </div>

</body>
</html>
