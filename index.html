<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #e9ecef; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .tarjeta-container {
            width: 500px; /* Tamaño un poco más grande */
            height: 500px; 
            /* Usamos la imagen que ya tiene el botón borrado */
            background-image: url('fondo_bono.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Alinea el botón al final de la tarjeta */
            align-items: center;
            padding-bottom: 40px; /* Ajusta qué tan arriba o abajo queda el botón */
        }

        .btn-nospi {
            background: linear-gradient(135deg, #005a8d, #32d74b);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .btn-nospi:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="tarjeta-container">
        <!-- El botón ahora se coloca automáticamente en la parte baja de la imagen -->
        <button class="btn-nospi" onclick="window.location.href='#'">
            Descubre Nospi
        </button>
    </div>

</body>
</html>
